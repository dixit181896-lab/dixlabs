<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIXLABS // NEURAL_SYNC_V8_PRO</title>
    <style>
        :root {
            --m-green: #00ff41;
            --m-dark: #003b00;
            --bg: #000800;
            --font: 'Courier New', monospace;
        }

        /* FIXED: Cursor changed from crosshair to default/pointer */
        * { box-sizing: border-box; cursor: default; }
        button, .opt-card { cursor: pointer; }

        body, html {
            background-color: var(--bg);
            color: var(--m-green);
            font-family: var(--font);
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #matrix-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
            opacity: 0.3;
        }

        #v8-interface {
            position: relative;
            z-index: 10;
            width: 95%;
            max-width: 1100px;
            height: 85vh;
            background: rgba(0, 15, 0, 0.95);
            border: 1px solid var(--m-green);
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0, 59, 0, 0.5);
            transition: all 0.5s ease;
        }

        /* NEW: Glitch Effect for High-Intensity Moments */
        .glitch-flash {
            animation: flash 0.1s i-nfinite;
        }
        @keyframes flash {
            0% { opacity: 1; } 50% { opacity: 0.5; background: var(--m-green); } 100% { opacity: 1; }
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
            border-bottom: 1px solid var(--m-green);
            font-size: 0.75rem;
            background: rgba(0, 255, 65, 0.05);
        }

        .main-stage {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
        }

        .hidden { display: none !important; }

        h1.neon {
            font-size: 4rem;
            text-align: center;
            margin: 0;
            letter-spacing: 20px;
            text-shadow: 0 0 20px var(--m-green);
        }

        .matrix-btn {
            background: transparent;
            border: 1px solid var(--m-green);
            color: var(--m-green);
            padding: 20px 50px;
            font-family: inherit;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            transition: 0.3s;
            align-self: center;
        }

        .matrix-btn:hover {
            background: var(--m-green);
            color: black;
            box-shadow: 0 0 30px var(--m-green);
        }

        .probe-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .opt-card {
            border: 1px solid var(--m-dark);
            padding: 25px;
            background: rgba(0, 30, 0, 0.4);
            transition: 0.2s;
            font-size: 1rem;
        }

        .opt-card:hover {
            border-color: var(--m-green);
            background: rgba(0, 255, 65, 0.1);
            transform: scale(1.02);
        }

        .hud-bottom {
            padding: 30px 60px;
            border-top: 1px solid var(--m-green);
        }

        .progress-rail {
            height: 4px;
            background: #001a00;
            width: 100%;
        }

        .progress-fill {
            height: 100%;
            background: var(--m-green);
            width: 0%;
            box-shadow: 0 0 15px var(--m-green);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Result View Features */
        .res-id { font-size: 5rem; margin: 0; font-weight: 900; }
        .hash-code { font-size: 0.7rem; color: #555; margin-top: 10px; word-break: break-all; }
    </style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<div id="v8-interface">
    <div class="hud-top">
        <span id="sys-time">SYS_TIME: 00:00:00</span>
        <span id="sys-load">CPU_LOAD: 12%</span>
        <span id="sys-status">STATUS: IDLE</span>
    </div>

    <div id="scr-start" class="main-stage">
        <h1 class="neon">SYNC_V8</h1>
        <p style="text-align: center; letter-spacing: 2px;">NEURAL_DNA_EXTRACTION_PROTOCOL</p>
        <button class="matrix-btn" onclick="startV8()">[ START_UPLOAD ]</button>
    </div>

    <div id="scr-quiz" class="main-stage hidden">
        <div id="q-header" style="font-size: 0.8rem; margin-bottom: 10px;">PROBE_INIT...</div>
        <div id="q-text" style="font-size: 2.2rem; margin-bottom: 40px; font-weight: bold;"></div>
        <div class="probe-grid" id="opt-grid"></div>
    </div>

    <div id="scr-res" class="main-stage hidden" style="text-align: center;">
        <div style="font-size: 1rem; color: #fff;">CORE_MATCH_STABILIZED</div>
        <h2 id="res-name" class="res-id"></h2>
        <div id="res-sport" style="font-size: 1.5rem; letter-spacing: 10px; margin-bottom: 20px;"></div>
        <p id="res-desc" style="max-width: 650px; margin: 0 auto; line-height: 1.8; color: #0f0;"></p>
        <div id="res-hash" class="hash-code"></div>
        <button class="matrix-btn" style="margin-top: 40px;" onclick="location.reload()">[ REBOOT ]</button>
    </div>

    <div class="hud-bottom">
        <div class="progress-rail"><div id="p-fill" class="progress-fill"></div></div>
        <div style="display: flex; justify-content: space-between; font-size: 0.8rem; margin-top: 10px;">
            <span id="p-label">READY_FOR_DATA</span>
            <span id="p-percent">0%</span>
        </div>
    </div>
</div>

<script>
/* --- DIXLABS V8 CORE ENGINE --- */

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, type, dur) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq || 440, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + (dur || 0.1));
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + (dur || 0.1));
}

const ROSTER = [
    { name: "Cristiano Ronaldo", sport: "Football", traits: [10, 5, 8, 7], desc: "ELITE_EFFICIENCY: Built for maximum physical dominance and statistical output." },
    { name: "Lionel Messi", sport: "Football", traits: [3, 10, 7, 10], desc: "NEURAL_GENIUS: Pattern recognition software operating at 100% capacity." },
    { name: "Max Verstappen", sport: "F1", traits: [9, 7, 10, 4], desc: "VELOCITY_ENTITY: High-speed aggression with zero-latency response times." },
    { name: "Virat Kohli", sport: "Cricket", traits: [10, 8, 6, 8], desc: "CHASE_PROTOCOL: High-intensity output driven by aggressive focus." },
    { name: "MS Dhoni", sport: "Cricket", traits: [2, 10, 4, 6], desc: "TACTICAL_CALM: Processing high-entropy scenarios with absolute stillness." },
    { name: "Lewis Hamilton", sport: "F1", traits: [6, 9, 10, 9], desc: "PRECISION_CONTROL: Mastery of high-speed hardware and creative racing lines." },
    { name: "Roger Federer", sport: "Tennis", traits: [3, 8, 6, 10], desc: "AESTHETIC_SYNC: Elegance as a primary operating system." },
    { name: "Rafael Nadal", sport: "Tennis", traits: [10, 6, 9, 5], desc: "RELENTLESS_LOOP: Unstoppable stamina and physical power recurrences." },
    { name: "Novak Djokovic", sport: "Tennis", traits: [7, 10, 9, 6], desc: "ELASTIC_DEFENSE: Impervious wall logic. Zero data leakage." },
    { name: "Erling Haaland", sport: "Football", traits: [10, 4, 9, 3], desc: "CYBORG_STRIKE: Objective-based logic focusing purely on goal conversion." },
    { name: "Rohit Sharma", sport: "Cricket", traits: [4, 10, 5, 10], desc: "FRAME_MANIPULATION: Gifted with extra processing time for high-speed inputs." },
    { name: "AB de Villiers", sport: "Cricket", traits: [8, 9, 9, 10], desc: "VECTOR_360: Capability to strike in any coordinate system simultaneously." },
    { name: "Kylian Mbappe", sport: "Football", traits: [7, 6, 10, 8], desc: "LIGHTNING_BUS: Rapid data transfer across field sectors." },
    { name: "Ayrton Senna", sport: "F1", traits: [10, 7, 10, 8], desc: "SPIRITUAL_SPEED: Driving on the edge of the matrix's physical limits." },
    { name: "Zinedine Zidane", sport: "Football", traits: [5, 10, 3, 10], desc: "ARCHITECT_CORE: Dictating global flow through technical perfection." },
    { name: "Ben Stokes", sport: "Cricket", traits: [10, 8, 7, 7], desc: "CLUTCH_UNIT: Activates maximum power when system failure is imminent." },
    { name: "Neymar Jr", sport: "Football", traits: [3, 5, 8, 10], desc: "STYLE_OVERRIDE: Breaking standard logic with creative flair." },
    { name: "Charles Leclerc", sport: "F1", traits: [8, 6, 10, 9], desc: "PEAK_QUALIFIER: Extracting 100% performance from unstable hardware." },
    { name: "Fernando Alonso", sport: "F1", traits: [8, 10, 8, 8], desc: "ADAPTIVE_ENGINE: Survival and optimization across any era or vehicle." },
    { name: "Carlos Alcaraz", sport: "Tennis", traits: [9, 7, 9, 9], desc: "FORCE_MULTIPLIER: Youthful energy combined with veteran strategy." }
];

const QUESTIONS = [
    { q: "REACTION TO FAILURE?", a: ["INTENSE_RELOAD", "ANALYZE_LOGS", "INSTANT_RETRY", "CREATIVE_SHRUG"], w: [0, 1, 2, 3] },
    { q: "IDEAL OPERATING PACE?", a: ["FULL_SPEED", "CALIBRATED", "LIGHTSPEED", "FLUID"], w: [0, 1, 2, 3] },
    { q: "CORE STRENGTH?", a: ["POWER", "VISION", "PACE", "FLAIR"], w: [0, 1, 2, 3] },
    { q: "THE CLUTCH MOMENT?", a: ["DOMINATE", "FREEZE_TIME", "ACCELERATE", "DANCE"], w: [0, 1, 2, 3] },
    { q: "ADAPTABILITY LEVEL?", a: ["STUBBORN_FORCE", "TACTICAL_SHIFT", "AERODYNAMIC", "ARTISTIC_FLOW"], w: [0, 1, 2, 3] },
    { q: "STAMINA DEPLETION?", a: ["GRIT_OVERDRIVE", "EFFICIENCY_MODE", "ENGINE_MAX", "STYLE_MAINTAINED"], w: [0, 1, 2, 3] },
    { q: "CROWD INTERFACE?", a: ["FEED_ON_NOISE", "SILENT_FOCUS", "ISOLATED_TRACK", "ENTERTAIN_CORE"], w: [0, 1, 2, 3] },
    { q: "PRE-GAME PROTOCOL?", a: ["PHYSICAL_WAR", "DATA_REVIEW", "SYSTEM_CHECK", "VIBE_SYNC"], w: [0, 1, 2, 3] },
    { q: "BATTLEFIELD PREFERENCE?", a: ["STADIUM_GRASS", "MIND_GAMES", "ASPHALT_HEAT", "OPEN_COURT"], w: [0, 1, 2, 3] },
    { q: "DEFENSIVE LOGIC?", a: ["AGGRESSIVE_PRESS", "ZONAL_CONTROL", "REACTION_TIME", "PREDICTIVE_MOVE"], w: [1, 2, 3, 0] },
    { q: "LEGACY GOAL?", a: ["GOAT_STATUS", "PERFECT_STATS", "RECORD_BREAKER", "INSPIRATION"], w: [0, 1, 2, 3] },
    { q: "FEAR THRESHOLD?", a: ["NON_EXISTENT", "CALCULATED_RISK", "ADRENALINE_JUNKIE", "N/A_CREATIVE"], w: [0, 1, 2, 3] },
    { q: "TRAINING INTENSITY?", a: ["SAYAJIN_LEVEL", "CHESS_MASTER", "MECHANICAL_PRECISION", "NATURAL_GIFT"], w: [0, 1, 2, 3] },
    { q: "RIVALRY ENERGY?", a: ["DESTROY_THEM", "OUTSMART_THEM", "OUTPACE_THEM", "OUTSHINE_THEM"], w: [0, 1, 2, 3] },
    { q: "NUTRITION/FUEL?", a: ["PURE_PROTEIN", "STRICT_CALIBRATION", "HIGH_OCTANE", "BALANCED_ZEN"], w: [0, 1, 2, 3] },
    { q: "POST-MATCH STATUS?", a: ["STILL_HUNGRY", "SYSTEM_SHUTDOWN", "COOLDOWN_LAP", "CELEBRATION_MODE"], w: [0, 1, 2, 3] },
    { q: "SITUATIONAL AWARENESS?", a: ["TUNNEL_VISION", "360_RADAR", "SENSORY_OVERLOAD", "PATIENT_WAIT"], w: [0, 1, 2, 3] },
    { q: "EQUIPMENT SYNC?", a: ["BOOT_CONNECTION", "BAT_EXTENSION", "CAR_TELEPATHY", "RACKET_FLUIDITY"], w: [0, 1, 2, 3] },
    { q: "WEATHER IMPACT?", a: ["IGNORE_ELEMENTS", "USE_TO_ADVANTAGE", "AERO_ADJUSTMENT", "DANCE_IN_RAIN"], w: [0, 1, 2, 3] },
    { q: "FINAL SYNC COMMAND?", a: ["EXECUTE_WIN", "UPLOAD_MASTERY", "INITIATE_SPEED", "BECOME_ART"], w: [0, 1, 2, 3] }
];
// Multiplier to reach 20
for(let i=0; i<16; i++) { QUESTIONS.push({...QUESTIONS[i%4], q: "VECTOR_SCAN_" + (i+5) + ": " + QUESTIONS[i%4].q}); }

let scores = [0, 0, 0, 0];
let currentQ = 0;

// Binary Rain
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');
let cols, drops;

function initCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    cols = Math.floor(canvas.width / 20);
    drops = Array(cols).fill(1);
}

function drawRain() {
    ctx.fillStyle = "rgba(0, 8, 0, 0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#0F0";
    ctx.font = "15px monospace";
    for(let i=0; i<drops.length; i++) {
        ctx.fillText(Math.floor(Math.random()*2), i*20, drops[i]*20);
        if(drops[i]*20 > canvas.height && Math.random() > 0.98) drops[i] = 0;
        drops[i]++;
    }
}

function startV8() {
    audioCtx.resume();
    playSound(220, 'square', 0.2);
    document.getElementById('scr-start').classList.add('hidden');
    document.getElementById('scr-quiz').classList.remove('hidden');
    document.getElementById('sys-status').innerText = "STATUS: SYNCING";
    initCanvas();
    setInterval(drawRain, 50);
    renderQ();
}

function renderQ() {
    // FIXED: Correct progress calculation to reach 100%
    const progress = (currentQ / QUESTIONS.length) * 100;
    document.getElementById('p-fill').style.width = progress + "%";
    document.getElementById('p-percent').innerText = Math.round(progress) + "%";
    document.getElementById('p-label').innerText = progress < 100 ? "EXTRACTING_DATA..." : "SYNC_COMPLETE";

    if(currentQ >= QUESTIONS.length) return showResult();
    
    const q = QUESTIONS[currentQ];
    document.getElementById('q-header').innerText = `PROBE_${(currentQ+1).toString().padStart(2, '0')}/20`;
    document.getElementById('q-text').innerText = `> ${q.q}`;
    
    const grid = document.getElementById('opt-grid');
    grid.innerHTML = "";
    
    q.a.forEach((opt, idx) => {
        const d = document.createElement('div');
        d.className = 'opt-card';
        d.innerText = `[ ${opt} ]`;
        d.onclick = () => {
            playSound(440 + (currentQ * 20), 'sine', 0.05);
            scores[q.w[idx]] += 5;
            currentQ++;
            renderQ();
        };
        grid.appendChild(d);
    });
}

function showResult() {
    // Force final 100% visual
    document.getElementById('p-fill').style.width = "100%";
    document.getElementById('p-percent').innerText = "100%";

    document.getElementById('scr-quiz').classList.add('hidden');
    document.getElementById('scr-res').classList.remove('hidden');
    document.getElementById('sys-status').innerText = "STATUS: STABLE";
    
    let winner = ROSTER[0];
    let minD = Infinity;

    ROSTER.forEach(ath => {
        let d = 0;
        ath.traits.forEach((v, i) => {
            const u = (scores[i] / 25) * 10;
            d += Math.abs(v - u);
        });
        if(d < minD) { minD = d; winner = ath; }
    });

    document.getElementById('res-name').innerText = winner.name.toUpperCase();
    document.getElementById('res-sport').innerText = winner.sport;
    document.getElementById('res-desc').innerText = `> ${winner.desc}`;
    
    // NEW Feature: Neural Hash Generation
    const hash = Array.from({length: 40}, () => Math.floor(Math.random()*16).toString(16)).join('');
    document.getElementById('res-hash').innerText = `NEURAL_SIGNATURE: ${hash}`;
    
    playSound(880, 'square', 0.3);
}

// System Clock
setInterval(() => {
    const d = new Date();
    document.getElementById('sys-time').innerText = `SYS_TIME: ${d.toTimeString().split(' ')[0]}`;
    document.getElementById('sys-load').innerText = `CPU_LOAD: ${Math.floor(Math.random()*15) + 10}%`;
}, 1000);

window.onresize = initCanvas;
</script>
</body>
</html>
